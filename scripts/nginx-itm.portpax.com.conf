##
## itm.portpax.com - PortPax frontend (shared server, same layout as wms.rbcold.com)
## Copy to server: /etc/nginx/sites-available/itm.portpax.com.conf
## Enable: ln -sf /etc/nginx/sites-available/itm.portpax.com.conf /etc/nginx/sites-enabled/
## Reload: nginx -t && systemctl reload nginx
##
## After first deploy, get certificate: certbot --nginx -d itm.portpax.com
##

##
## HTTP (port 80)
##
server {
    listen 80;
    server_name itm.portpax.com;

    # Let's Encrypt http-01 challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Redirect rest to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

##
## HTTPS (port 443) - enable after certbot
##
server {
    listen 443 ssl;
    server_name itm.portpax.com;

    root /home/git/itm/frontend/dist;
    index index.html;

    # SPA + Next export: prueba $uri.html (login -> login.html) y fallback a index.html
    location / {
        try_files $uri $uri.html $uri/ /index.html =404;
    }

    ssl_certificate /etc/letsencrypt/live/itm.portpax.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/itm.portpax.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
